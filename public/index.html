<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rise In Confidence — Coach Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #EEF4FF; }</style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Patch fetch to redirect Anthropic API calls through proxy
    const _originalFetch = window.fetch;
    window.fetch = function(url, options) {
      if (typeof url === 'string' && url.includes('api.anthropic.com')) {
        url = '/api/chat';
      }
      return _originalFetch(url, options);
    };
  </script>
  <script type="text/babel" data-presets="react" src="./portal.js"></script>
</body>
</html>
